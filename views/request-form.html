<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Request - HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>Post Your Request</h1>
    <p>Share your ideal look and let stores select the best thrift finds for you.</p>
  </header>

  <main class="page-shell">
    <section class="card form-card">
      <div class="section-title">Request details</div>
      <p class="section-intro">Keep it simple: describe the style, your budget, and the size you need.</p>

      <form id="requestForm" enctype="multipart/form-data">
        <input type="text" id="style" placeholder="Style (e.g. Korean, Vintage, Party)" required />
        <input type="number" id="budget" placeholder="Budget in ₹" required />
        <input type="text" id="size" placeholder="Size (S / M / L / XL)" required />

        <select id="category" required>
          <option value="">Select category</option>
          <option value="Casual">Casual</option>
          <option value="Party Wear">Party Wear</option>
          <option value="Traditional">Traditional</option>
          <option value="Western">Western</option>
          <option value="Formal">Formal</option>
        </select>

        <label style="display:block; margin-bottom:0.75rem; font-weight:700; color: var(--text-primary);">Upload inspiration</label>
        <input type="file" id="image" accept="image/*" />

        <button type="submit">Post Request</button>
      </form>

      <p id="requestMessage" class="center text-small" style="margin-top:1rem;"></p>
      <div class="center" style="margin-top:1.5rem;">
        <a href="/customer-dashboard">⬅ Back to dashboard</a>
      </div>
    </section>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
