<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>💳 Secure Checkout</h1>
    <p>Complete your payment safely and securely</p>
  </header>

  <div class="container">
    <div class="card form-card">
      <h2 class="center">Select Payment Method</h2>

      <div id="checkoutMessage" class="message"></div>

      <form id="checkoutForm">
        <input type="hidden" id="paymentMethod" />

        <div class="payment-grid">
          <div class="payment-option" onclick="selectPayment('PhonePe', this)">
            <div class="payment-icon">📱</div>
            <div class="payment-title">PhonePe</div>
          </div>

          <div class="payment-option" onclick="selectPayment('Google Pay', this)">
            <div class="payment-icon">🔵</div>
            <div class="payment-title">Google Pay</div>
          </div>

          <div class="payment-option" onclick="selectPayment('Paytm', this)">
            <div class="payment-icon">🟦</div>
            <div class="payment-title">Paytm</div>
          </div>

          <div class="payment-option" onclick="selectPayment('Card', this)">
            <div class="payment-icon">💳</div>
            <div class="payment-title">Debit Card</div>
          </div>

          <div class="payment-option" onclick="selectPayment('Cash on Delivery', this)">
            <div class="payment-icon">💰</div>
            <div class="payment-title">COD</div>
          </div>

          <div class="payment-option" onclick="selectPayment('Net Banking', this)">
            <div class="payment-icon">🏦</div>
            <div class="payment-title">Net Banking</div>
          </div>
        </div>

        <div id="upiSection" style="display:none;">
          <input type="text" id="upiId" placeholder="Enter UPI ID (example@paytm)" />
        </div>

        <div id="cardSection" style="display:none;">
          <input type="text" id="cardNumber" placeholder="Card Number (16 digits)" maxlength="16" />
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" />
            <input type="text" id="cardCVV" placeholder="CVV" maxlength="3" />
          </div>
        </div>

        <select id="deliveryMode">
          <option value="Standard">📦 Standard Delivery (5-7 days)</option>
          <option value="Express">🚚 Express Delivery (2-3 days)</option>
          <option value="Overnight">⚡ Overnight Delivery</option>
        </select>

        <button type="submit" id="checkoutBtn">Complete Payment</button>
      </form>

      <div class="center" style="margin-top: 1.5rem;">
        <p class="text-small">🔒 Your payment is 100% secure and encrypted</p>
        <a href="/customer-dashboard">⬅ Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script src="/js/payment.js"></script>
</body>
</html>
