<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo"><span>HU</span>HANG UP</div>
      <h2>Create account</h2>
      <p class="auth-subline">Sign up as a customer or store owner.</p>

      <div id="signupMessage" class="message"></div>

      <form id="signupForm">
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email Address" required />
        <input type="password" id="signupPassword" placeholder="Password" required />
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required />
        <select id="signupRole" required>
          <option value="">Select your role</option>
          <option value="customer">Customer</option>
          <option value="store">Store Owner</option>
        </select>
        <button type="submit" id="signupBtn">Sign Up</button>
      </form>

      <p class="center text-small" style="margin-top: 1.5rem;">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
