<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="splash" class="splash-screen">
    <div class="brand-animation">
      <h1 class="brand-text">HANG UP</h1>
    </div>
  </div>

  <div id="mainContent" class="main-content" style="display: none;">
    <header class="landing-header">
      <h1>HANG UP</h1>
      <p>Thrift styling made simple</p>
    </header>

    <main class="page-shell">
      <section class="auth-section">
        <div id="authButtons">
          <a href="/signup" class="button button-primary">Create Account</a>
          <a href="/login" class="button button-secondary">Login</a>
        </div>
        <div id="dashboardLinks" style="display: none;">
          <a href="/customer-dashboard" class="button button-primary">Go to Dashboard</a>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Check if user is logged in
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    // Show splash animation for 1 second
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';

      // Show appropriate buttons based on login status
      if (token && user) {
        document.getElementById('authButtons').style.display = 'none';
        document.getElementById('dashboardLinks').style.display = 'flex';
      } else {
        document.getElementById('authButtons').style.display = 'flex';
        document.getElementById('dashboardLinks').style.display = 'none';
      }
    }, 1000);
  </script>
</body>
</html>
