<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>Login</h1>
    <p>Access your HANG UP account</p>
  </header>

  <div class="container">
    <div class="card form-card">
      <h2 class="center">Welcome Back</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="loginMessage" class="center"></p>
      <p class="center">Don't have an account? <a href="/signup">Signup</a></p>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
