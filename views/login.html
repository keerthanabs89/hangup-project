<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - HANG UP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>Welcome Back! 👋</h1>
    <p>Access your HANG UP account securely</p>
  </header>

  <div class="container">
    <div class="card form-card">
      <h2 class="center">Login</h2>

      <div id="loginMessage" class="message"></div>

      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email Address" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login Securely</button>
      </form>

      <p class="center text-small" style="margin-top: 1.5rem;">
        Don't have an account? <a href="/signup">Create one now</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
